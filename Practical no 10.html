<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HTML Frames Example</title>
</head>
<body>
  <h1>Embedding Maps and External Pages</h1>

  <!-- Embedding Google Maps -->
  <h2>My Location Map</h2>
  <iframe 
    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3153.086!2d-122.4194!3d37.7749!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x8085809c2f0f0f0f%3A0x123456789abcdef!2sSan%20Francisco!5e0!3m2!1sen!2sus!4v1610000000000"
    width="600" 
    height="400" 
    style="border:0;" 
    allowfullscreen="" 
    loading="lazy">
  </iframe>

  <!-- Embedding an external webpage -->
  <h2>External Webpage</h2>
  <iframe 
    src="https://www.wikipedia.org" 
    width="600" 
    height="400">
  </iframe>

</body>
</html>
