<!DOCTYPE html>
<html>
<head>
<style>
body {
  text-align: center;
  font-family: Arial;
}

.gallery img {
  width: 200px;
  margin: 10px;
  transition: 0.5s;
  border-radius: 10px;
}

.gallery img:hover {
  transform: scale(1.1);
  filter: brightness(70%);
}
</style>
</head>

<body>

<h2>Flower Gallery</h2>

<div class="gallery">
  <img src="https://images.unsplash.com/photo-1501004318641-b39e6451bec6">
  <img src="https://images.unsplash.com/photo-1490750967868-88aa4486c946">
  <img src="https://images.unsplash.com/photo-1503023345310-bd7c1de61c7d">
</div>

</body>
</html>
