<!DOCTYPE html>
<html>
<head>
  <title>HTML5 APIs Demo</title>
  <style>
    #dragSource, #dropTarget {
      width: 150px;
      height: 150px;
      border: 2px dashed #333;
      margin: 20px;
      display: inline-block;
      text-align: center;
      line-height: 150px;
    }
    #dragSource {
      background-color: lightblue;
      cursor: grab;
    }
    #dropTarget {
      background-color: lightyellow;
    }
  </style>
</head>
<body>
  <h2>HTML5 APIs Demonstration</h2>

  <!-- Drag & Drop -->
  <h3>Drag & Drop Example</h3>
  <div id="dragSource" draggable="true">Drag me</div>
  <div id="dropTarget">Drop here</div>
  <p id="dropResult"></p>

  <!-- Geolocation -->
  <h3>Geolocation Example</h3>
  <button onclick="getLocation()">Get My Location</button>
  <p id="locationResult"></p>

  <!-- Web Storage -->
  <h3>Web Storage Example</h3>
  <input type="text" id="nameInput" placeholder="Enter your name">
  <button onclick="saveName()">Save Name</button>
  <button onclick="showName()">Show Saved Name</button>
  <p id="storageResult"></p>

  <script>
    // Drag & Drop
    const dragSource = document.getElementById("dragSource");
    const dropTarget = document.getElementById("dropTarget");
    const dropResult = document.getElementById("dropResult");

    dragSource.addEventListener("dragstart", function(event) {
      event.dataTransfer.setData("text", event.target.id);
    });

    dropTarget.addEventListener("dragover", function(event) {
      event.preventDefault(); // Allow drop
    });

    dropTarget.addEventListener("drop", function(event) {
      event.preventDefault();
      const data = event.dataTransfer.getData("text");
      dropResult.textContent = "You dropped: " + data;
    });

    // Geolocation
    function getLocation() {
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(showPosition);
      } else {
        document.getElementById("locationResult").textContent = "Geolocation not supported.";
      }
    }

    function showPosition(position) {
      document.getElementById("locationResult").textContent =
        "Latitude: " + position.coords.latitude +
        ", Longitude: " + position.coords.longitude;
    }

    // Web Storage
    function saveName() {
      const name = document.getElementById("nameInput").value;
      localStorage.setItem("username", name);
      document.getElementById("storageResult").textContent = "Name saved!";
    }

    function showName() {
      const storedName = localStorage.getItem("username");
      if (storedName) {
        document.getElementById("storageResult").textContent = "Saved name: " + storedName;
      } else {
        document.getElementById("storageResult").textContent = "No name saved.";
      }
    }
  </script>
</body>
</html>
